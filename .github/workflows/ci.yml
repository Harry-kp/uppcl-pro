name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python · lint + syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt ruff
      - name: ruff check
        run: ruff check uppcl_api.py appsavy.py
      - name: compile-only sanity
        run: python -m py_compile uppcl_api.py appsavy.py

  web:
    name: Web · lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Build (static export)
        # STATIC=1 flips next.config to output: 'export' — matches Pi deployment.
        run: STATIC=1 bun run build
