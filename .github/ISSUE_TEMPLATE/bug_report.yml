name: Bug report
description: Something isn't working the way you expected
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what did you see instead?
      placeholder: |
        Steps:
        1. Opened http://localhost:3000/ledger
        2. Clicked "Export CSV"
        Expected: CSV with all bills
        Got: 404 in network tab
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Python version, Node/Bun version, dashboard route, and whether you're running on desktop or Raspberry Pi.
      placeholder: |
        - macOS 14.4 / Ubuntu 22.04 / RPi OS Bookworm (aarch64)
        - Python 3.11.8
        - Bun 1.1.28 / Node 20.11.0
        - Route: /ledger
        - Deploy: local dev / Pi / Docker
    validations:
      required: true

  - type: textarea
    id: proxy-log
    attributes:
      label: Proxy log (uvicorn output)
      description: Last ~20 lines from the proxy terminal, if relevant. Scrub any JWT or session IDs.
      render: text

  - type: textarea
    id: browser-console
    attributes:
      label: Browser console (if UI bug)
      render: text

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I have searched existing issues for duplicates.
          required: true
        - label: I have scrubbed any PII (connection IDs, JWTs, phone numbers) from my logs.
          required: true
