<!DOCTYPE html>
<html>
  <head>
    <title>UPPCL Pro — Swagger UI</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
    <style>
      /* note banner */
      #try-note {
        background: #1a3a1a; border-bottom: 1px solid #2a5a2a;
        color: #8fd98f; font-family: -apple-system, sans-serif;
        font-size: 12px; padding: 8px 20px; text-align: center;
      }
      #try-note a { color: #6fcf6f; }
    </style>
  </head>
  <body>
    <div id="try-note">
      Schema browsing works here without any setup.
      <strong>Try it out</strong> requires the proxy running locally —
      see <a href="https://github.com/Harry-kp/uppcl-pro#quickstart" target="_blank">Quickstart</a>.
      &nbsp;·&nbsp;
      <a href="./api.html">Switch to ReDoc →</a>
    </div>
    <div id="swagger-ui"></div>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
    <script>
      window.onload = function() {
        SwaggerUIBundle({
          url: "./openapi.json",
          dom_id: '#swagger-ui',
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          layout: "StandaloneLayout",
          deepLinking: true,
          tryItOutEnabled: true,
        });
      };
    </script>
  </body>
</html>
